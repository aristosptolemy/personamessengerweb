name: Deploy to Firebase Hosting on merge

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_APP_URL: ${{ secrets.VITE_APP_URL }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}

      - name: Check localhost source
        run: npx firebase-tools@14.22.0 deploy --only hosting --project pmapp-39c6e --debug

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_CHAT }}
          # 以下のオプションにより、以降のすべてのステップで自動的に環境変数が有効になります
          create_credentials_file: true
          export_environment_variables: true

      - name: Deploy to Firebase Hosting
        # 重複していた GOOGLE_APPLICATION_CREDENTIALS の手動指定を削除しました
        # 代わりに、プロジェクトIDの紐付けを強固にする環境変数を設定しています
        env:
          NODE_OPTIONS: "--dns-result-order=ipv4first"
          FIREBASE_CLI_PREVIEWS: hostingchannels
        run: npx firebase-tools@14.22.0 deploy --only hosting --project staffdata-b7495 --debug